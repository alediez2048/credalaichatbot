name: Prompt Eval

on:
  pull_request:
    paths:
      - 'backend/config/prompts/**'
      - 'backend/app/services/llm/**'
      - 'backend/app/services/onboarding/orchestrator.rb'
      - 'backend/test/eval/**'

jobs:
  eval:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/credal_eval_test
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_PROJECT: credal-onboarding-ci
      EVAL_PASS_THRESHOLD: ${{ vars.EVAL_PASS_THRESHOLD || '85' }}
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: backend

      - name: Setup database
        run: cd backend && bundle exec rails db:create db:schema:load

      - name: Run eval suite
        run: cd backend && bundle exec rails eval:ci

      - name: Comment eval results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'backend/tmp/eval_report.json';
            if (!fs.existsSync(path)) {
              console.log('No eval report found');
              return;
            }
            const report = JSON.parse(fs.readFileSync(path, 'utf8'));
            const threshold = process.env.EVAL_PASS_THRESHOLD || 85;
            const status = report.pass_rate >= threshold ? 'PASSED' : 'BELOW THRESHOLD';
            const icon = report.pass_rate >= threshold ? ':white_check_mark:' : ':x:';

            let body = `## ${icon} Eval Results — ${status}\n\n`;
            body += `| Metric | Value |\n|--------|-------|\n`;
            body += `| Pass Rate | **${report.pass_rate}%** (threshold: ${threshold}%) |\n`;
            body += `| Passed | ${report.passed} / ${report.total} |\n`;
            body += `| Failed | ${report.failed} |\n`;
            body += `| Timestamp | ${report.timestamp} |\n\n`;

            if (report.failures && report.failures.length > 0) {
              body += `### Failing Cases\n\n`;
              report.failures.forEach(f => {
                body += `- **${f.name}** (${f.category}): ${f.reason}\n`;
              });
            }

            body += `\n---\n_Generated by Prompt Eval CI_`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
