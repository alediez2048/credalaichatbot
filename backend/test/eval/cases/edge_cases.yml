- name: "edge_empty_input"
  category: "edge_cases"
  input: " "
  strategy: "not_contains"
  expected: "error"
  step: "welcome"

- name: "edge_long_input"
  category: "edge_cases"
  input: "This is a very long message that goes on and on and on about nothing in particular, I just want to see how the bot handles really verbose input that doesn't contain any useful onboarding information whatsoever and keeps rambling."
  strategy: "not_contains"
  expected: "error"
  step: "personal_info"

- name: "edge_off_topic"
  category: "edge_cases"
  input: "What's the weather like today?"
  strategy: "contains"
  expected: "onboarding"
  step: "personal_info"

- name: "edge_special_chars"
  category: "edge_cases"
  input: "My name is O'Brien-Smith"
  strategy: "not_contains"
  expected: "error"
  step: "personal_info"

- name: "edge_numbers_only"
  category: "edge_cases"
  input: "12345"
  strategy: "not_contains"
  expected: "crash"
  step: "personal_info"

- name: "edge_emoji"
  category: "edge_cases"
  input: "👍 sounds good"
  strategy: "not_contains"
  expected: "error"
  step: "welcome"

- name: "edge_repeat_question"
  category: "edge_cases"
  input: "What? I don't understand"
  strategy: "not_contains"
  expected: "error"
  step: "personal_info"
